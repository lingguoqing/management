server:
  port: 5631

spring:
  # redis配置
  redis:
    database: 1
    host: 127.0.0.1
    port: 6379
    timeout: 10s
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0
  datasource:
    url: jdbc:mysql://localhost:3306/management_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

mybatis-plus:
  # 实体类扫描路径
  type-aliases-package: com.management.entity
  # Mapper XML 文件路径
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # SQL 日志输出
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键类型：ASSIGN_ID(雪花算法)
      id-type: ASSIGN_ID
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置
sa-token:
  # Token 名称
  token-name: Authorization
  # Token 有效期（30天，单位：秒）
  timeout: 2592000
  # Token 临时有效期（3天内无操作则过期）
  active-timeout: 259200
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 是否共享同一账号 Token
  is-share: true
  # Token 风格：uuid
  token-style: random-128
  # 是否输出操作日志
  is-log: true

# Knife4j API 文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.management.controller

# 日志配置
logging:
  level:
    com.management: debug
    org.springframework: warn
